name: Release Please

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          package-name: GUETCampusNetAutoLogin

  build-and-upload:
    needs: release-please
    runs-on: windows-latest
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore FuckGUETCampusNetwork.sln

      - name: Build Release
        run: msbuild FuckGUETCampusNetwork.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Package Application
        run: |
          $releaseDir = "bin\Release"
          $packageName = "GUETCampusNetAutoLogin-v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}"
          $packagePath = "$packageName.zip"

          # 复制必要的文件到临时目录
          $tempDir = "temp_package"
          New-Item -ItemType Directory -Force -Path $tempDir

          # 复制可执行文件和依赖
          Copy-Item -Path "$releaseDir\GUETCampusNetAutoLogin.exe" -Destination $tempDir
          Copy-Item -Path "$releaseDir\*.dll" -Destination $tempDir -ErrorAction SilentlyContinue
          Copy-Item -Path "$releaseDir\*.config" -Destination $tempDir -ErrorAction SilentlyContinue

          # 创建 ZIP 包
          Compress-Archive -Path "$tempDir\*" -DestinationPath $packagePath -Force

          # 清理临时目录
          Remove-Item -Recurse -Force $tempDir

          Write-Output "package_path=$packagePath" >> $env:GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release-please.outputs.upload_url }}
          asset_path: ./GUETCampusNetAutoLogin-*.zip
          asset_name: GUETCampusNetAutoLogin-v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}.zip
          asset_content_type: application/zip
